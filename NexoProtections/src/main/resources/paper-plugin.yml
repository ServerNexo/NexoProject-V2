name: NexoProtections
version: '${project.version}'
main: me.nexo.protections.NexoProtections
api-version: '1.21'
authors:
  - 'Arquitecto'
description: 'Motor Híbrido de Protecciones de NexoNetwork'

# 🚀 SISTEMA DE DEPENDENCIAS MODERNO (Paper)
dependencies:
  server:
    NexoCore:
      load: BEFORE
      required: true
    NexoClans:
      load: BEFORE
      required: true
    NexoItems:
      load: BEFORE
      required: false

# 📚 PERMISOS (Integración Nativa LuckPerms)
permissions:
  nexo.admin:
    description: 'Permite el acceso a comandos de administración de protecciones.'
    default: op