name: NexoProtections
version: '1.0'
main: me.nexo.protections.NexoProtections
description: 'Motor Híbrido de Protecciones de NexoNetwork'
authors:
  - 'Arquitecto'
# 🌟 FIX: Aplicado el estándar exacto de la documentación de Paper
api-version: '26.1.2'

dependencies:
  server:
    # 📌 DEPENDENCIAS FUERTES (Obligatorias)
    NexoCore:
      load: BEFORE
      required: true
      join-classpath: true
    NexoClans:
      load: BEFORE
      required: true
      join-classpath: true

    # 📌 DEPENDENCIAS SUAVES (Opcionales)
    NexoItems:
      load: BEFORE
      required: false
      join-classpath: true

# 💡 NOTA: El comando /nexo ha sido eliminado del YAML.
# Tu framework Lamp lo inyectará directamente desde tu código Java en tiempo de ejecución.