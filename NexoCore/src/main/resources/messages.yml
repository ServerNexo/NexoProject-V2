# ================================================= #
# 🏛️ Nexo Network - Mensajes del Sistema (Type-Safe)
# ================================================= #
#
# Guía de Formato (Adventure API / Crossplay):
# - Usa códigos de color HEX de Vivid Void (ej. &#ff00ff)
# - Las variables (ej. %player%) se inyectarán dinámicamente en el Core.

comandos:
  nexocore:
    errores:
      offline: "&#8b0000[!] Error: El operario objetivo no está en línea."
      cargando: "&#8b0000[!] Sincronizando datos con la red. Intente de nuevo en unos segundos..."
      formato-invalido: "&#8b0000[!] Error de formato: La cantidad debe ser numérica."
    uso: "&#E6CCFFUso del sistema: &#ff00ff/nexocore <darxp|darcombatexp> <operario> <cantidad>"
    exito:
      dar-xp: "&#00f5ff[✓] Transferencia de %amount% Nexo XP a %target% completada."
      dar-combate-xp: "&#00f5ff[✓] Transferencia de %amount% Combate XP a %target% completada."
    feedback:
      recibir-combate-xp: "&#8b0000⚔ +%amount% XP de Combate &#E6CCFF(%xp%/%xpreq%)"
    subida-nivel:
      nexo:
        titulo: "&#ff00ff<bold>¡NEXO NIVEL %level%!</bold>"
        subtitulo: "&#00f5ffHas ascendido en la jerarquía del servidor"
      combate:
        titulo: "&#8b0000<bold>¡COMBATE NIVEL %level%!</bold>"
        subtitulo: "&#E6CCFFTus instintos bélicos se agudizan..."

  # 🌐 Textos del módulo de panel web integrados
  web:
    exito1: "&#ff00ff<bold>[Nexo Web]</bold> &#00f5ff¡Tu Clave del Vacío ha sido registrada con éxito!"
    exito2: "&#E6CCFFYa puedes iniciar sesión en el panel web."
    error-db: "&#8b0000[!] Error: No se encontró tu perfil en la base de datos. ¡Vuelve a entrar al servidor!"
    error-critico: "&#8b0000[!] Ocurrió un error crítico de seguridad al registrar tu clave."