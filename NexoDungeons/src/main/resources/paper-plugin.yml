name: NexoDungeons
version: '${project.version}'
main: me.nexo.dungeons.NexoDungeons
api-version: '1.21'
description: 'Motor Híbrido de Mazmorras y Puzzles Data-Driven.'
authors:
  - 'Z0101'

# 🚀 SISTEMA DE DEPENDENCIAS MODERNO (Paper Parallel Classloader)
dependencies:
  server:
    NexoCore:
      load: BEFORE
      required: true
    NexoEconomy:
      load: BEFORE
      required: true
    FastAsyncWorldEdit:
      load: BEFORE
      required: true
    MythicMobs:
      load: BEFORE
      required: true

# 📚 PERMISOS (Integración Nativa con LuckPerms)
permissions:
  nexodungeons.user:
    description: 'Permite abrir el menú principal de Nexo Dungeons.'
    default: true