# ==========================================
# 🏛️ Nexo Network - Arquitectura Enterprise
# Manifiesto Nativo Paper 1.21.5+ (NexoItems)
# ==========================================

name: NexoItems
version: '${version}'
main: me.nexo.items.NexoItems
api-version: '1.21'
description: 'Manejador de armaduras, armas, mochilas y accesorios.'

# 🚀 SISTEMA DE DEPENDENCIAS MODERNO (Paper Parallel Classloader)
dependencies:
  server:
    NexoCore:
      load: BEFORE
      required: true
    Nexo:
      load: BEFORE
      required: true

# 📚 PERMISOS NATIVOS (Integración con LuckPerms)
permissions:
  nexoitems.user:
    description: 'Permite el acceso a menús de usuario como desguace, accesorios, pv, forja y wardrobe.'
    default: true
  nexo.admin:
    description: 'Permite el uso de herramientas de testeo de desarrollador.'
    default: op