      required: true
      load: BEFORE
    NexoProtections:
      required: true
      load: BEFORE
    NexoItems:
      required: false
      load: BEFORE

# 💡 NOTA DEL ARQUITECTO: La sección "commands:" ha sido purgada.
# El ComandoFactory se inyecta nativamente en el CommandMap en tiempo de ejecución.