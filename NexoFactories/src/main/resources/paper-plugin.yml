# 🏭 NexoFactories - Manifiesto Enterprise (Paper 1.21.5+)
name: NexoFactories
version: '${project.version}'
main: me.nexo.factories.NexoFactories
description: 'Motor de automatización, lógica y ensamblaje industrial.'
authors:
  - 'TuNombre'
api-version: '1.21'

# 💉 Control estricto de dependencias para el ClassLoader de Paper
