# ==========================================
# 🏛️ Nexo Network - Arquitectura Enterprise
# Manifiesto Nativo Paper 1.21.5+ (NexoEconomy)
# ==========================================

name: NexoEconomy
# 🌟 FIX CRÍTICO: Usamos la llave exacta que Gradle nos envía
version: '${version}'
main: me.nexo.economy.NexoEconomy
api-version: '1.21'
description: 'Motor Financiero Global, Bazar y Mercado Clandestino.'

# 🚀 SISTEMA DE DEPENDENCIAS MODERNO (Paper Parallel Classloader)
dependencies:
  server:
    NexoCore:
      load: BEFORE
      required: true
    NexoItems:
      load: BEFORE
      required: true


# 📚 PERMISOS NATIVOS (Integración con LuckPerms)
permissions:
  nexoeconomy.user:
    description: 'Permite el acceso a los comandos básicos de economía, bazar y trade.'
    default: true
  nexoeconomy.admin:
    description: 'Permite emitir fondos, alterar cuentas y abrir el mercado negro remotamente.'
    default: op