name: NexoMechanics
version: '${project.version}'
main: me.nexo.mechanics.NexoMechanics
description: 'Mecanicas adicionales y minijuegos.'
author: 'TuNombre'
# 🌟 FIX: Aplicado el estándar exacto de la documentación de Paper
api-version: '26.1.2'

dependencies:
  server:
    # 📌 DEPENDENCIAS FUERTES (Obligatorias)
    NexoCore:
      load: BEFORE
      required: true
      join-classpath: true
    NexoEconomy:
      load: BEFORE
      required: true
      join-classpath: true

    # 📌 DEPENDENCIAS SUAVES (Opcionales)
    NexoProtections:
      load: BEFORE
      required: false
      join-classpath: true

# 💡 NOTA: El comando /skilltree ha sido eliminado del YAML.
# El framework Lamp lo inyectará directamente desde tu código Java.