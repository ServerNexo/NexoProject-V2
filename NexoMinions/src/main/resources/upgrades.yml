# ==========================================
# ⚙️ CONFIGURACIÓN DE MEJORAS Y COMBUSTIBLES
# ==========================================
# Tipos soportados: SPEED_TEMP, SPEED_PERM, COMPACTOR, STORAGE_LINK

upgrades:
  carbon_normal:
    material: COAL
    tipo: SPEED_TEMP
    bonus_velocidad: 0.15  # 15% más rápido
    usos: 20               # Consume 1 carbón cada 20 trabajos

  lava_infinita:
    material: LAVA_BUCKET
    tipo: SPEED_PERM
    bonus_velocidad: 0.05  # 5% infinito

  carbon_nexo:
    nexo_id: "enchanted_coal" # Si usas Nexo, ignora el material y busca esta ID
    material: COAL
    tipo: SPEED_TEMP
    bonus_velocidad: 0.30
    usos: 50

  compactador_basico:
    material: DROPPER
    tipo: COMPACTOR

  enlace_cofres:
    material: HOPPER
    tipo: STORAGE_LINK     # Activa la magia de guardar en cofres

  expansor_pequeno:
    material: CHEST
    tipo: STORAGE
    bonus_capacidad: 128