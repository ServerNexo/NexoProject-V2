name: NexoPvP
version: '${project.version}'
main: me.nexo.pvp.NexoPvP
description: 'Sistema de combate y pasivas PvP.'
author: 'TuNombre'
# 🌟 FIX: Aplicado el estándar exacto de la documentación de Paper
api-version: '26.1.2'

dependencies:
  server:
    # 📌 DEPENDENCIAS FUERTES (Obligatorias)
    NexoCore:
      load: BEFORE
      required: true
      join-classpath: true
    NexoProtections:
      load: BEFORE
      required: true
      join-classpath: true
    NexoEconomy:
      load: BEFORE
      required: true
      join-classpath: true

    # 📌 DEPENDENCIAS SUAVES (Opcionales)
    NexoWar:
      load: BEFORE
      required: false
      join-classpath: true

# 📚 DICCIONARIO GLOBAL DE PERMISOS (Soportado nativamente por el nuevo estándar)
permissions:
  nexopvp.user:
    description: Permite activar o desactivar el modo PvP.
    default: true # 'true' hace que los usuarios normales ya lo tengan

  nexopvp.templo:
    description: Permite abrir el menú del templo de bendiciones.
    default: true

  nexopvp.admin:
    description: Permisos administrativos del módulo PvP.
    default: op # Solo los OP (operadores) lo tienen por defecto