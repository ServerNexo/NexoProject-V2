# ==========================================
# 🏛️ Nexo Network - Arquitectura Enterprise
# Manifiesto Nativo Paper 1.21.5+ (NexoPvP)
# ==========================================

name: NexoPvP
version: '${version}'
main: me.nexo.pvp.NexoPvP
api-version: '1.21'
authors:
  - 'TuNombre'
description: 'Sistema de combate y pasivas PvP.'

# 🚀 SISTEMA DE DEPENDENCIAS MODERNO (Paper)
dependencies:
  server:
    # Dependencias estrictas (Hard-Depends)
    NexoCore:
      load: BEFORE
      required: true
    NexoProtections:
      load: BEFORE
      required: true
    NexoEconomy:
      load: BEFORE
      required: true
    # Dependencias opcionales (Soft-Depends)
    NexoWar:
      load: BEFORE
      required: false

# 📚 DICCIONARIO GLOBAL DE PERMISOS (Integración Nativa LuckPerms)
permissions:
  nexopvp.user:
    description: 'Permite activar o desactivar el modo PvP.'
    default: true
  nexopvp.templo:
    description: 'Permite abrir el menú del templo de bendiciones.'
    default: true
  nexopvp.admin:
    description: 'Permisos administrativos del módulo PvP.'
    default: op